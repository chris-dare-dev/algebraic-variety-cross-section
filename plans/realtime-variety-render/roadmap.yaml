title: "Realtime Variety Render — slider-drag latency arc"
status: active
phase: sequenced
brief: |
  Progressively reduce surface-regeneration latency from >0.5s to imperceptible
  during slider/grid-dot drag. Quick-wins bundle first (telemetry, grid-cap
  hygiene, queue-latest re-entrancy fix, debounce, clip cache), then the Hanson
  parametric continuous-drag fast-path, the mandatory macOS background-thread
  spike, the worker + coarse-preview LOD destination arc, Numba JIT field
  kernels, and VTK Flying Edges. Source: capability-scout realtime-variety-render
  final report (2026-05-22, 13 candidates).
horizon: { start: 2026-05-22, end: 2026-09-30 }
goal:
  hmw: "How might we progressively reduce surface-regeneration latency from >0.5 s to imperceptible during slider/grid-dot drag, so that a researcher exploring the algebraic variety families can observe the surface morphing in real time without releasing the control?"
  objective: "By 2026-09-30, a researcher can drag any Calabi–Yau Hanson-family slider and watch the surface update continuously (no release required), and dragging an implicit-surface slider shows a coarse-but-valid preview in motion with the final full-resolution surface snapping into place on release — all without the slider freezing or the final drag position being silently dropped."
  key_results:
  - "CAND-5 ships: every fast drag-and-release on an implicit surface correctly renders the slider's final resting position — confirmed by off-screen render at the default parameter + a manual drag-release smoke check (the current CRITICAL correctness bug is eliminated)."
  - "CAND-12 ships: the status bar displays a measured render time in ms for every surface generation call, providing a before/after baseline for all subsequent performance candidates."
  - "CAND-8 ships: the Calabi–Yau Hanson surfaces (3 parametric figures) update visibly at every slider tick during a drag without requiring release — confirmed by a typical_ms measurement ≤ 80 ms on the dev machine."
  - "CAND-3 + CAND-4 ship: implicit surfaces show a coarse-preview mesh updating during drag (with 'Preview' status-bar badge) and snap to full resolution on release — CAND-4 spike passes first."
  assumptions:
  - tier: must
    text: "pyvistaqt issue #793 does NOT hang on the current dev machine's installed PySide6 version, OR the requirements.txt pin can be tightened to PySide6 <6.10 without breaking other functionality."
    validation: "e3 macOS thread-safety spike: reproduce the hang on the dev machine before any CAND-4 implementation work (≤2 days); CAND-3 and CAND-2 are both downstream of CAND-4, so this gates the entire destination arc. Executed — e4 worker shipped 2026-05-22 (spike go)."
  - tier: must
    text: "VTK + QThread are safe to use concurrently on macOS arm64 — pv.PolyData objects can be constructed on a worker thread and handed to the main thread via a Qt.QueuedConnection signal without a GC-triggered crash (VTK GitLab #18782)."
    validation: "e3 spike: prove with a minimal off-screen PolyData-via-signal round-trip test on the dev machine, no plotter; explicit Python ref retention is the documented mitigation. Executed — mitigation replicated in the e4 worker implementation."
  - tier: must
    text: "Numba @njit(parallel=True) is available and stable on macOS arm64 (Numba 0.60+) with the workqueue threading layer (not unguarded TBB)."
    validation: "e5 Numba arm64 spike: install and verify before CAND-2 implementation; Apple-Silicon wheels confirmed on PyPI but not validated against this app's deps. Executed — spike doc committed 3a07e6e, e5 v0 + e5b v1 shipped."
  - tier: should
    text: "The quality delta between n=220 and n=260 grid resolution is imperceptible at viewport zoom for Fermat quartic and Enriques Fig 4."
    validation: "fallback: keep n=260 for both if a spot-check off-screen render reveals visible degradation, accepting slightly higher latency on the interactive path"
  - tier: should
    text: "The coarse-preview n=80 floor is topologically honest for Kummer (16 nodes remain visually distinct) and Dwork conifold at ψ≈1."
    validation: "fallback: raise the floor to n=100 or n=120 for affected surfaces; must be validated via an off-screen n-sweep before CAND-3 ships"
  - tier: should
    text: "Flying Edges (CAND-1) produces visually equivalent surface quality to skimage marching cubes for all 8 implicit generators on Apple Silicon — the loss of analytic gradient normals does not produce visible shading degradation on Enriques sextic or Kummer high-curvature regions."
    validation: "fallback: keep skimage MC if off-screen Kummer+Enriques comparison renders show visible shading regression; Flying Edges is independent of the destination arc and can be deferred without blocking anything"
  - tier: should
    text: "Numba first-call JIT latency for the initial 2-generator v0 scope (Fermat + Enriques canonical sextic) stays under 500 ms total with a startup warm-up strategy."
    validation: "fallback: move warm-up to background thread at first surface selection rather than eager app startup"
  - tier: might
    text: "A single hand-rolled QTimer-based debounce utility shared between ParametersPanel and ParameterGridPanel (a ui_helpers addition) is the cleanest CAND-6 implementation — defer: if superqt is already pulled in by CAND-4's worker pattern, @qdebounced is equally valid; decide at implementation time."
  - tier: might
    text: "typical_ms: int = 0 is a cleaner Surface dataclass field than fast: bool for CAND-8's speed-routing — defer: decide at CAND-8 implementation time; challenger CC-3 prefers typical_ms but either is valid."
  - tier: might
    text: "CAND-11 (clipped-mesh cache) delivers a measurable latency reduction on the appearance-only-change path — defer: confirm with CAND-12 telemetry after it ships."
  wont:
  - "No pytest-qt UI tests for the threading worker lifecycle or signal-slot path (AI-2 / CONTEXT.md §9 — macOS Qt+VTK offscreen segfault prohibits this until the environment constraint changes)."
  - "No parameter-space mesh interpolation / morphing between cached meshes (AI-15 violation per synthesis tension #2 — the interpolated mesh corresponds to no algebraic equation; parking-lotted permanently for a math-education tool)."
  - "No GPU isosurfacing or raycasting path (AI-1 / AI-3 conflict — produces a rasterized image, not pv.PolyData; breaks domain clipping AI-4 and Hanson normals AI-7; macOS Metal VTK backend still experimental as of 2026)."
  - "No new variety families or additional figures in this roadmap — this roadmap is exclusively the latency/interactivity arc for the existing 8 generators."
  - "No QSettings persistence of slider values, surface selection, or window layout (CONTEXT.md §9 explicit deferral)."
